<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Market Listesi">
<title>Market Listesi</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro", sans-serif;
    background: #f2f2f7;
    color: #1c1c1e;
    padding: 12px;
    padding-bottom: 40px;
    font-size: 17px;
  }
  .card {
    background: #fff;
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 12px;
  }
  h1 {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 12px;
    text-align: center;
  }
  .status {
    text-align: center;
    font-size: 13px;
    color: #8e8e93;
    margin-bottom: 12px;
  }
  .status.connected { color: #34c759; }
  .status.error { color: #ff3b30; }
  label {
    display: block;
    font-size: 14px;
    color: #8e8e93;
    margin-bottom: 4px;
    font-weight: 500;
  }
  input[type="text"], input[type="date"], select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #d1d1d6;
    border-radius: 8px;
    font-size: 16px;
    background: #fff;
    margin-bottom: 8px;
    -webkit-appearance: none;
    appearance: none;
    font-family: inherit;
  }
  button {
    width: 100%;
    padding: 12px;
    background: #007aff;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    touch-action: manipulation;
    -webkit-tap-highlight-color: rgba(0, 122, 255, 0.2);
  }
  button:active { background: #0051d5; }
  button.secondary {
    background: #e5e5ea;
    color: #1c1c1e;
  }
  .button-row {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }
  .button-row button {
    flex: 1;
    padding: 10px;
    font-size: 14px;
  }
  .filter-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  .filter-row > div { flex: 1; }
  .filter-row button {
    width: auto;
    padding: 10px 14px;
    font-size: 14px;
  }
  .date-chip {
    background: #007aff;
    color: #fff;
    padding: 4px 8px 4px 10px;
    border-radius: 14px;
    font-size: 13px;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
  }
  .date-chip:active { background: #0051d5; }
  .date-chip .x {
    font-size: 16px;
    line-height: 1;
    margin-left: 2px;
    padding: 0 2px;
    opacity: 0.85;
  }
  .date-chip-clear {
    background: #e5e5ea;
    color: #1c1c1e;
    padding: 4px 10px;
    border-radius: 14px;
    font-size: 12px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    font-family: inherit;
  }
  .list-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    padding: 0 4px;
  }
  .list-title { font-weight: 600; font-size: 17px; }
  .count { font-size: 14px; color: #8e8e93; }

  /* Yan yana satır görünümü — tarih yok, sadece check + talep + market + sil */
  .item-row {
    display: grid;
    grid-template-columns: 32px 1fr 1fr 32px;
    gap: 6px;
    align-items: center;
    padding: 6px 2px;
    border-bottom: 1px solid #f2f2f7;
  }
  .item-row:last-child { border-bottom: none; }
  .item-row.done .cell-text { text-decoration: line-through; color: #8e8e93; }
  .item-row.done .cell-market { color: #c7c7cc; }

  .cell-check {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 44px;
  }
  .cell-check input[type="checkbox"] {
    width: 24px;
    height: 24px;
    cursor: pointer;
    accent-color: #34c759;
    touch-action: manipulation;
  }
  .cell-date {
    font-size: 13px;
    color: #8e8e93;
    text-align: center;
    font-weight: 500;
  }
  /* Düzenlenebilir hücreler — daha rahat dokunma için */
  .cell-text, .cell-market {
    word-wrap: break-word;
    overflow-wrap: break-word;
    cursor: pointer;
    padding: 10px 8px;
    border-radius: 6px;
    min-height: 44px;
    display: flex;
    align-items: center;
    transition: background 0.15s;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }
  .cell-text {
    font-size: 17px;
    font-weight: 700;
    text-transform: uppercase;
    background: #f9f9fb;
    border: 1px dashed transparent;
  }
  .cell-market {
    font-size: 17px;
    font-weight: 700;
    text-transform: uppercase;
    color: #1c1c1e;
    background: #f9f9fb;
    border: 1px dashed transparent;
  }
  .cell-text:active, .cell-market:active {
    background: #e5e5ea;
    border-color: #007aff;
  }
  @media (hover: hover) {
    .cell-text:hover, .cell-market:hover {
      background: #eef0f3;
      border-color: #c7c7cc;
    }
  }
  .cell-delete {
    background: none;
    color: #ff3b30;
    border: none;
    font-size: 22px;
    padding: 4px;
    width: 32px;
    height: 44px;
    cursor: pointer;
  }

  .table-header {
    display: grid;
    grid-template-columns: 32px 1fr 1fr 32px;
    gap: 6px;
    padding: 8px 2px;
    border-bottom: 1px solid #d1d1d6;
    font-size: 12px;
    font-weight: 600;
    color: #8e8e93;
    text-transform: uppercase;
  }
  .table-header > div { text-align: center; }
  .table-header > div:nth-child(2),
  .table-header > div:nth-child(3) { text-align: left; }

  .empty {
    text-align: center;
    color: #c7c7cc;
    padding: 24px 0;
    font-size: 15px;
  }
  /* Market seçim grid butonları */
  .market-btn {
    padding: 10px 6px;
    border: 2px solid #d1d1d6;
    border-radius: 10px;
    background: #fff;
    font-size: 14px;
    font-weight: 500;
    color: #1c1c1e;
    cursor: pointer;
    font-family: inherit;
    text-align: center;
    transition: all 0.15s;
    width: 100%;
    touch-action: manipulation;
  }
  .market-btn:active { background: #e5e5ea; }
  .market-btn.selected {
    background: #007aff;
    color: #fff;
    border-color: #007aff;
    font-weight: 600;
  }
  .market-btn.other {
    background: #fff3cd;
    border-color: #eed28b;
    color: #856404;
  }
  .market-btn.other.selected {
    background: #e6b800;
    color: #fff;
    border-color: #e6b800;
  }
  .edit-input {
    width: 100%;
    padding: 8px 8px;
    font-size: 16px;
    border: 2px solid #007aff;
    border-radius: 6px;
    -webkit-appearance: none;
    appearance: none;
    font-family: inherit;
    background: #fff;
    box-sizing: border-box;
  }
  select.edit-input {
    padding-right: 24px;
    background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'%3E%3Cpath fill='%23007aff' d='M0 0l5 6 5-6z'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 8px center;
  }
  /* Düzenleme moduna giren hücre — padding sıfırlanır, input rahat oturur */
  .cell-text.editing, .cell-market.editing {
    padding: 0;
    background: transparent;
    border: none;
  }
  /* Düzenlenen satırı vurgula */
  .item-row.editing {
    background: #fffbe6;
    border-radius: 8px;
  }

  /* Modal pencere - market seçimi için */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    z-index: 1000;
    padding: 0;
  }
  .modal-content {
    background: #fff;
    border-radius: 14px 14px 0 0;
    width: 100%;
    max-width: 500px;
    padding: 16px;
    max-height: 85vh;
    overflow-y: auto;
  }
  .modal-title {
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 12px;
    text-align: center;
    color: #1c1c1e;
  }
  .modal-subtitle {
    font-size: 13px;
    color: #8e8e93;
    text-align: center;
    margin-bottom: 16px;
  }
  .modal-option {
    display: block;
    width: 100%;
    padding: 14px 16px;
    background: #f2f2f7;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    text-align: left;
    margin-bottom: 8px;
    cursor: pointer;
    color: #1c1c1e;
    font-family: inherit;
    touch-action: manipulation;
    -webkit-tap-highlight-color: rgba(0, 122, 255, 0.2);
  }
  .modal-option:active { background: #e5e5ea; }
  .modal-option.selected {
    background: #007aff;
    color: #fff;
    font-weight: 600;
  }
  .modal-option.other {
    background: #fff3cd;
    color: #856404;
  }
  .modal-cancel {
    width: 100%;
    padding: 14px;
    background: #fff;
    color: #ff3b30;
    border: 1px solid #d1d1d6;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    margin-top: 8px;
    cursor: pointer;
    font-family: inherit;
  }
  .modal-input {
    width: 100%;
    padding: 14px 16px;
    font-size: 16px;
    border: 2px solid #007aff;
    border-radius: 10px;
    margin-bottom: 12px;
    -webkit-appearance: none;
    appearance: none;
    font-family: inherit;
    box-sizing: border-box;
  }
  .modal-save {
    width: 100%;
    padding: 14px;
    background: #007aff;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    margin-bottom: 8px;
  }
</style>
</head>
<body>

<h1>Market Listesi</h1>
<div class="status" id="status">Bağlanıyor...</div>

<div class="card">
  <label>Tarih filtresi (birden fazla seçebilirsin)</label>
  <div class="filter-row">
    <div>
      <input type="date" id="filter-date">
    </div>
    <button class="secondary" id="today-btn">Bugün</button>
  </div>
  <div id="selected-dates" style="margin-top: 8px; display: flex; flex-wrap: wrap; gap: 6px;"></div>
  <div class="button-row">
    <button class="secondary" id="show-hidden-btn">Gizlenenleri Göster</button>
    <button id="refresh-btn">Güncelle</button>
  </div>
</div>

<div class="card">
  <label>Yeni talep</label>
  <input type="text" id="item-input" placeholder="Ne alınacak? (örn: Süt)">
  <div id="market-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 8px;">
    <button type="button" class="market-btn" data-market="Amasya Et">Amasya Et</button>
    <button type="button" class="market-btn" data-market="BİM">BİM</button>
    <button type="button" class="market-btn" data-market="Çamlıca">Çamlıca</button>
    <button type="button" class="market-btn" data-market="Çiğ Köfteci">Çiğ Köfteci</button>
    <button type="button" class="market-btn" data-market="Fırın">Fırın</button>
    <button type="button" class="market-btn" data-market="Gedikler">Gedikler</button>
    <button type="button" class="market-btn" data-market="Kuruyemişçi">Kuruyemişçi</button>
    <button type="button" class="market-btn other" data-market="__other__">Diğer ✏️</button>
  </div>
  <input type="text" id="market-input" placeholder="Market adını yaz" style="display: none;">
  <button id="add-btn">Listeye Ekle</button>
</div>

<div class="card">
  <div class="list-header">
    <span class="list-title" id="list-title">Bugünün listesi</span>
    <span class="count" id="count">0 öğe</span>
  </div>
  <div class="table-header">
    <div>✓</div>
    <div>Talep</div>
    <div>Market</div>
    <div></div>
  </div>
  <div id="items-container"></div>
</div>

<div class="card" id="report-card">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
    <div style="font-weight: 600; font-size: 17px;">📋 Rapor</div>
  </div>
  <p style="font-size: 13px; color: #8e8e93; margin-bottom: 8px;">Seçtiğin tarih aralığındaki tüm listeleri tarar, benzer ürünleri birleştirir, özet alışveriş listesi oluşturur.</p>
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px;">
    <div>
      <label>Başlangıç</label>
      <input type="date" id="report-start">
    </div>
    <div>
      <label>Bitiş</label>
      <input type="date" id="report-end">
    </div>
  </div>
  <button type="button" id="report-btn" style="
    width: 100%;
    padding: 12px;
    background: #5856d6;
    font-size: 16px;
    font-weight: 600;
    border-radius: 8px;
    margin-bottom: 8px;
  ">Rapor Oluştur</button>
  <div id="report-result" style="display: none;">
    <div id="report-list" style="margin-bottom: 10px;"></div>
    <button type="button" id="report-wa-btn" style="
      width: 100%;
      padding: 12px;
      background: #25d366;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    ">📱 WhatsApp ile Gönder</button>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getFirestore, collection, addDoc, deleteDoc, updateDoc,
    doc, onSnapshot, query, orderBy, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // Firebase yapılandırması — market-listesi-999 projesi
  const firebaseConfig = {
    apiKey: "AIzaSyB4sRJeiHQh_OEf5yICAmGduKwuIIhtuEg",
    authDomain: "market-listesi-999.firebaseapp.com",
    projectId: "market-listesi-999",
    storageBucket: "market-listesi-999.firebasestorage.app",
    messagingSenderId: "482602062709",
    appId: "1:482602062709:web:5d07cd210596d03d23b93c",
    measurementId: "G-GQGGW5R7LV"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const itemsCol = collection(db, "market-items");

  // Önceden tanımlı market listesi (hem yeni ekleme hem düzenleme dropdown'unda kullanılır)
  const PRESET_MARKETS = ["Amasya Et", "BİM", "Çamlıca", "Çiğ Köfteci", "Fırın", "Gedikler", "Kuruyemişçi"];

  let allItems = [];
  let selectedDates = []; // Çoklu seçili tarihler (boşsa bugün gösterilir)
  const statusEl = document.getElementById("status");
  const itemsContainer = document.getElementById("items-container");
  const filterDate = document.getElementById("filter-date");
  const selectedDatesEl = document.getElementById("selected-dates");
  const listTitle = document.getElementById("list-title");
  const countEl = document.getElementById("count");

  // Bugünün tarihini her seferinde tazeden hesapla (gece yarısı geçişi için)
  function getToday() {
    return new Date().toISOString().slice(0, 10);
  }
  let today = getToday();
  filterDate.value = today;

  // Her dakika kontrol et — gün değiştiyse otomatik bugüne geç
  setInterval(() => {
    const newToday = getToday();
    if (newToday !== today) {
      // Eski "bugün"ün seçili olduğu durumu güncelle
      const oldToday = today;
      today = newToday;
      // Eğer eski bugün seçili tarihler arasındaysa, yeni bugün ile değiştir
      const idx = selectedDates.indexOf(oldToday);
      if (idx !== -1) {
        selectedDates[idx] = newToday;
      }
      filterDate.value = newToday;
      render();
    }
  }, 60000);

  // Gerçek zamanlı dinleme — 3 telefon da anında güncellenir
  const q = query(itemsCol, orderBy("createdAt", "desc"));
  onSnapshot(q, (snapshot) => {
    allItems = [];
    snapshot.forEach((docSnap) => {
      allItems.push({ id: docSnap.id, ...docSnap.data() });
    });
    statusEl.textContent = "● Senkronize (3 telefon bağlı)";
    statusEl.className = "status connected";

    // Eğer kullanıcı şu an bir alan düzenliyorsa, render'ı ertele
    // (yoksa input/select kullanıcının elinden alınır)
    if (document.querySelector(".item-row.editing")) {
      return; // Düzenleme bitince zaten render tetiklenecek
    }
    render();
  }, (err) => {
    statusEl.textContent = "Bağlantı hatası: " + err.message;
    statusEl.className = "status error";
  });

  // Görünüm modu: false = sadece işaretsizler, true = hepsi (gizliler dahil)
  let showHidden = false;

  function render() {
    // Hangi tarihler gösterilecek?
    // - Hiç seçim yoksa: bugün
    // - Seçim varsa: o tarihler
    const datesToShow = selectedDates.length > 0 ? selectedDates : [today];
    let filtered = allItems.filter(i => datesToShow.includes(i.date));

    // Önce tarih, sonra market adına göre sırala (çoklu tarihte aynı günler bir arada)
    filtered.sort((a, b) => {
      const dateCompare = a.date.localeCompare(b.date);
      if (dateCompare !== 0) return dateCompare;
      const ma = (a.market || "").toLocaleLowerCase("tr");
      const mb = (b.market || "").toLocaleLowerCase("tr");
      return ma.localeCompare(mb, "tr");
    });

    // Gizleme modundaysak işaretli olanları çıkar
    const totalCount = filtered.length;
    if (!showHidden) {
      filtered = filtered.filter(i => !i.done);
    }
    const hiddenCount = totalCount - filtered.length;

    // Başlık
    if (selectedDates.length === 0) {
      listTitle.textContent = "Bugünün listesi";
    } else if (selectedDates.length === 1) {
      listTitle.textContent = selectedDates[0] === today
        ? "Bugünün listesi"
        : selectedDates[0] + " listesi";
    } else {
      listTitle.textContent = selectedDates.length + " tarih seçili";
    }

    if (showHidden) {
      countEl.textContent = totalCount + " öğe (tümü)";
    } else if (hiddenCount > 0) {
      countEl.textContent = filtered.length + " öğe · " + hiddenCount + " gizli";
    } else {
      countEl.textContent = filtered.length + " öğe";
    }

    if (filtered.length === 0) {
      itemsContainer.innerHTML = '<div class="empty">Seçili tarihlerde gösterilecek öğe yok</div>';
      return;
    }

    itemsContainer.innerHTML = "";
    filtered.forEach(item => {
      const row = document.createElement("div");
      row.className = "item-row" + (item.done ? " done" : "");

      // Onay kutusu
      const checkCell = document.createElement("div");
      checkCell.className = "cell-check";
      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.checked = !!item.done;
      cb.addEventListener("change", async () => {
        // İşaretle/işaret kaldır — silmiyoruz, sadece "done" durumunu değiştiriyoruz
        // "Güncelle" butonuna basılana kadar listede görünmeye devam eder
        try {
          await updateDoc(doc(db, "market-items", item.id), {
            done: cb.checked
          });
        } catch (e) {
          alert("Güncelleme hatası: " + e.message);
          cb.checked = !cb.checked;
        }
      });
      checkCell.appendChild(cb);

      // Talep (düzenlenebilir)
      const textCell = document.createElement("div");
      textCell.className = "cell-text";
      textCell.textContent = item.text;
      textCell.addEventListener("click", (e) => {
        e.stopPropagation();
        makeEditable(textCell, item, "text");
      });

      // Market (düzenlenebilir)
      const marketCell = document.createElement("div");
      marketCell.className = "cell-market";
      marketCell.textContent = item.market || "—";
      marketCell.addEventListener("click", (e) => {
        e.stopPropagation();
        makeEditable(marketCell, item, "market");
      });

      // Sil butonu
      const delCell = document.createElement("button");
      delCell.className = "cell-delete";
      delCell.innerHTML = "×";
      delCell.title = "Sil";
      delCell.addEventListener("click", async () => {
        if (confirm("Bu öğeyi silmek istiyor musun?")) {
          await deleteDoc(doc(db, "market-items", item.id));
        }
      });

      row.appendChild(checkCell);
      row.appendChild(textCell);
      row.appendChild(marketCell);
      row.appendChild(delCell);
      itemsContainer.appendChild(row);
    });
  }

  // Hücreyi düzenlenebilir yap (her telefondan değişiklik mümkün)
  function makeEditable(cell, item, field) {
    const oldValue = item[field] || "";

    // Market alanı için select aç
    if (field === "market") {
      makeMarketEditable(cell, item, oldValue);
      return;
    }

    // Diğer alanlar (talep) için normal text input
    const row = cell.closest(".item-row");
    cell.classList.add("editing");
    if (row) row.classList.add("editing");

    const input = document.createElement("input");
    input.type = "text";
    input.value = oldValue;
    input.className = "edit-input";
    cell.innerHTML = "";
    cell.appendChild(input);
    input.focus();
    input.select();

    const cleanup = () => {
      cell.classList.remove("editing");
      if (row) row.classList.remove("editing");
    };

    const save = async () => {
      const newValue = input.value.trim();
      if (newValue && newValue !== oldValue) {
        try {
          await updateDoc(doc(db, "market-items", item.id), {
            [field]: newValue
          });
          // render() Firestore snapshot ile gelir, class'ı manuel kaldır
          cleanup();
        } catch (e) {
          alert("Güncelleme hatası: " + e.message);
          cell.textContent = oldValue;
          cleanup();
        }
      } else {
        cell.textContent = oldValue || "—";
        cleanup();
      }
    };

    input.addEventListener("blur", save);
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") input.blur();
      if (e.key === "Escape") {
        cell.textContent = oldValue || "—";
        cleanup();
      }
    });
  }

  // Market hücresini düzenle — Modal popup ile (iPhone'da güvenli)
  function makeMarketEditable(cell, item, oldValue) {
    // Zaten bir modal açıksa, ikincisini açma
    if (document.querySelector(".modal-overlay")) {
      return;
    }

    const row = cell.closest(".item-row");
    if (row) row.classList.add("editing");

    const cleanup = () => {
      if (row) row.classList.remove("editing");
    };

    // Modal arka planı
    const overlay = document.createElement("div");
    overlay.className = "modal-overlay";

    const content = document.createElement("div");
    content.className = "modal-content";
    overlay.appendChild(content);

    function closeModal() {
      if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
      cleanup();
    }

    // Preset market butonlarını oluştur
    function renderMarketList() {
      content.innerHTML = "";

      const title = document.createElement("div");
      title.className = "modal-title";
      title.textContent = "Market seç";
      content.appendChild(title);

      const subtitle = document.createElement("div");
      subtitle.className = "modal-subtitle";
      subtitle.textContent = "Şu an: " + (oldValue || "—");
      content.appendChild(subtitle);

      PRESET_MARKETS.forEach(name => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "modal-option" + (name === oldValue ? " selected" : "");
        btn.textContent = name;
        btn.onclick = function() {
          if (name !== oldValue) {
            updateDoc(doc(db, "market-items", item.id), { market: name })
              .catch(e => alert("Güncelleme hatası: " + e.message));
          }
          closeModal();
        };
        content.appendChild(btn);
      });

      // "Diğer" — elle yazma seçeneği
      const otherBtn = document.createElement("button");
      otherBtn.type = "button";
      otherBtn.className = "modal-option other";
      otherBtn.textContent = "Diğer (elle yaz)…";
      otherBtn.onclick = function() {
        renderTextInput();
      };
      content.appendChild(otherBtn);

      // İptal butonu
      const cancelBtn = document.createElement("button");
      cancelBtn.type = "button";
      cancelBtn.className = "modal-cancel";
      cancelBtn.textContent = "İptal";
      cancelBtn.onclick = closeModal;
      content.appendChild(cancelBtn);
    }

    // Elle yazma ekranı
    function renderTextInput() {
      content.innerHTML = "";

      const editTitle = document.createElement("div");
      editTitle.className = "modal-title";
      editTitle.textContent = "Market adı yaz";
      content.appendChild(editTitle);

      const input = document.createElement("input");
      input.type = "text";
      input.className = "modal-input";
      input.placeholder = "Market adı";
      input.value = PRESET_MARKETS.includes(oldValue) ? "" : oldValue;
      content.appendChild(input);

      const saveBtn = document.createElement("button");
      saveBtn.type = "button";
      saveBtn.className = "modal-save";
      saveBtn.textContent = "Kaydet";
      saveBtn.onclick = function() {
        const newValue = input.value.trim();
        if (newValue && newValue !== oldValue) {
          updateDoc(doc(db, "market-items", item.id), { market: newValue })
            .catch(e => alert("Güncelleme hatası: " + e.message));
        }
        closeModal();
      };
      content.appendChild(saveBtn);

      const cancelBtn = document.createElement("button");
      cancelBtn.type = "button";
      cancelBtn.className = "modal-cancel";
      cancelBtn.textContent = "İptal";
      cancelBtn.onclick = closeModal;
      content.appendChild(cancelBtn);

      setTimeout(() => input.focus(), 150);
    }

    // İlk ekranı çiz
    renderMarketList();

    // Arka plana dokunulursa kapat — butonlar dahil değil çünkü onclick'leri var
    // Sadece overlay'in kendisine doğrudan tıklanırsa kapanır
    overlay.onclick = function(e) {
      if (e.target === overlay) {
        closeModal();
      }
    };

    document.body.appendChild(overlay);
  }

  // Market grid butonları — tıklayınca seçilir, tekrar tıklayınca seçim kalkar
  let selectedMarket = "";
  const marketInput = document.getElementById("market-input");
  const marketGrid = document.getElementById("market-grid");

  marketGrid.addEventListener("click", (e) => {
    const btn = e.target.closest(".market-btn");
    if (!btn) return;
    const value = btn.dataset.market;

    if (value === "__other__") {
      // Diğer seçeneklerin seçimini kaldır
      marketGrid.querySelectorAll(".market-btn").forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
      selectedMarket = "__other__";
      marketInput.style.display = "block";
      marketInput.focus();
    } else {
      // Aynı butona tekrar tıklanırsa seçimi kaldır
      if (selectedMarket === value) {
        btn.classList.remove("selected");
        selectedMarket = "";
      } else {
        marketGrid.querySelectorAll(".market-btn").forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
        selectedMarket = value;
      }
      marketInput.style.display = "none";
      marketInput.value = "";
    }
  });

  function clearMarketSelection() {
    selectedMarket = "";
    marketGrid.querySelectorAll(".market-btn").forEach(b => b.classList.remove("selected"));
    marketInput.style.display = "none";
    marketInput.value = "";
  }

  // Yeni öğe ekle
  document.getElementById("add-btn").addEventListener("click", async () => {
    const textInput = document.getElementById("item-input");
    const text = textInput.value.trim();

    // Market değerini doğru kaynaktan al
    let market = "";
    if (selectedMarket === "__other__") {
      market = marketInput.value.trim();
    } else if (selectedMarket) {
      market = selectedMarket;
    }

    if (!text) {
      alert("Lütfen ne alınacağını yaz");
      return;
    }
    if (!market) {
      alert("Lütfen bir market seç");
      return;
    }

    try {
      const currentDay = getToday();
      today = currentDay;

      // Önce formu temizle
      textInput.value = "";
      clearMarketSelection();
      filterDate.value = currentDay;

      // Yeni eklenen öğeyi görebilmek için bugünü seçili tarihlere ekle
      if (selectedDates.length > 0 && !selectedDates.includes(currentDay)) {
        selectedDates.push(currentDay);
        selectedDates.sort();
        renderDateChips();
      }

      textInput.focus();

      // Sonra Firestore'a yaz
      await addDoc(itemsCol, {
        text: text,
        market: market,
        date: currentDay,
        done: false,
        createdAt: serverTimestamp()
      });
      render();
    } catch (e) {
      alert("Ekleme hatası: " + e.message);
    }
  });

  // Enter tuşu ile ekleme (elle yazma kutusunda)
  marketInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") document.getElementById("add-btn").click();
  });

  document.getElementById("today-btn").addEventListener("click", () => {
    // Tüm seçimleri temizle, sadece bugünü göster
    selectedDates = [];
    filterDate.value = today;
    showHidden = false;
    updateShowHiddenBtnLabel();
    renderDateChips();
    render();
  });

  // "Gizlenenleri Göster" butonu — seçili tarihteki tüm öğeleri (gizliler dahil) listeler
  const showHiddenBtn = document.getElementById("show-hidden-btn");
  function updateShowHiddenBtnLabel() {
    showHiddenBtn.textContent = showHidden ? "Sadece Aktifler" : "Gizlenenleri Göster";
  }
  showHiddenBtn.addEventListener("click", () => {
    showHidden = !showHidden;
    updateShowHiddenBtnLabel();
    render();
  });

  // "Güncelle" butonu — seçili tarihteki işaretli olanları yeniden gizler
  document.getElementById("refresh-btn").addEventListener("click", () => {
    showHidden = false;
    updateShowHiddenBtnLabel();
    render();
  });

  // Tarih seçilince listeye chip olarak ekle (zaten varsa eklemez)
  filterDate.addEventListener("change", () => {
    const date = filterDate.value;
    if (!date) return;
    if (!selectedDates.includes(date)) {
      selectedDates.push(date);
      selectedDates.sort();
    }
    renderDateChips();
    render();
  });

  // Sayfa tekrar açıldığında / telefondan dönüldüğünde gün kontrolü yap
  document.addEventListener("visibilitychange", () => {
    if (!document.hidden) {
      const newToday = getToday();
      if (newToday !== today) {
        const oldToday = today;
        today = newToday;
        const idx = selectedDates.indexOf(oldToday);
        if (idx !== -1) {
          selectedDates[idx] = newToday;
        }
      }
      render();
    }
  });

  // Tarih chip'lerini çiz
  function renderDateChips() {
    selectedDatesEl.innerHTML = "";
    if (selectedDates.length === 0) return;

    selectedDates.forEach(date => {
      const chip = document.createElement("span");
      chip.className = "date-chip";

      const d = new Date(date + "T00:00:00");
      const label = d.getDate() + "/" + (d.getMonth() + 1);
      chip.innerHTML = label + ' <span class="x">×</span>';

      chip.onclick = () => {
        selectedDates = selectedDates.filter(x => x !== date);
        renderDateChips();
        render();
      };
      selectedDatesEl.appendChild(chip);
    });

    // Tümünü Temizle butonu (2+ tarih varsa)
    if (selectedDates.length > 1) {
      const clearBtn = document.createElement("button");
      clearBtn.className = "date-chip-clear";
      clearBtn.type = "button";
      clearBtn.textContent = "Tümünü Temizle";
      clearBtn.onclick = () => {
        selectedDates = [];
        renderDateChips();
        render();
      };
      selectedDatesEl.appendChild(clearBtn);
    }
  }

  // ========== RAPOR ==========

  // Varsayılan tarihler: son 2 ay — bugün
  (function setDefaultReportDates() {
    const now = new Date();
    const twoMonthsAgo = new Date(now);
    twoMonthsAgo.setMonth(now.getMonth() - 2);
    document.getElementById("report-start").value = twoMonthsAgo.toISOString().slice(0, 10);
    document.getElementById("report-end").value = now.toISOString().slice(0, 10);
  })();

  // Türkçe karakter normalizasyonu — benzer ürünleri eşleştirmek için
  function normalizeText(text) {
    return (text || "")
      .trim()
      .toLocaleLowerCase("tr")
      .replace(/ğ/g, "g")
      .replace(/ü/g, "u")
      .replace(/ş/g, "s")
      .replace(/ı/g, "i")
      .replace(/ö/g, "o")
      .replace(/ç/g, "c")
      .replace(/â/g, "a")
      .replace(/î/g, "i")
      .replace(/û/g, "u")
      .replace(/[^a-z0-9\s]/g, "") // noktalama vb. temizle
      .replace(/\s+/g, " ")        // çoklu boşluk tek boşluk
      .trim();
  }

  // İki metin ne kadar benzer? (0-1 arası, 1 = aynı)
  function similarity(a, b) {
    if (a === b) return 1;
    if (!a || !b) return 0;

    // Kelime bazlı karşılaştırma
    const wordsA = new Set(a.split(" ").filter(w => w.length > 1));
    const wordsB = new Set(b.split(" ").filter(w => w.length > 1));
    if (wordsA.size === 0 || wordsB.size === 0) return 0;

    let commonWords = 0;
    wordsA.forEach(w => { if (wordsB.has(w)) commonWords++; });

    // Jaccard benzerliği
    const union = new Set([...wordsA, ...wordsB]).size;
    const jaccard = commonWords / union;

    // Tek kelimelik ürünler (ekmek, süt, peynir vb.) için:
    // Sadece Jaccard kullan — alt küme eşleşmesi yapma.
    // Yoksa "ekmek" ile "ekmek kadayıfı" birleşir ve ekmek kaybolur.
    // "ekmek" vs "ekmek" → Jaccard = 1.0 → eşleşir ✓
    // "ekmek" vs "ekmek kadayıfı" → Jaccard = 0.5 → eşleşmez ✓
    const minSize = Math.min(wordsA.size, wordsB.size);
    if (minSize <= 1) {
      return jaccard;
    }

    // 2+ kelimelik ürünler için alt küme skoru da kullan
    // "kent slim grey" vs "kent slim gri" → Jaccard = 0.5, subset = 0.57 → eşleşir ✓
    const subsetScore = commonWords / minSize;
    return Math.max(jaccard, subsetScore * 0.85);
  }

  // Akıllı tekilleştirme: benzer ürünleri birleştir
  function smartDeduplicate(items) {
    // Her öğeyi normalleştir
    const entries = items.map(item => ({
      original: (item.text || "").trim(),
      normalized: normalizeText(item.text)
    }));

    // Benzersiz gruplar oluştur
    const groups = []; // her grup: { canonical: "en uzun isim", normalized: "...", count: N }

    entries.forEach(entry => {
      if (!entry.normalized) return;

      // Mevcut gruplarda benzer var mı?
      let found = false;
      for (let g of groups) {
        const sim = similarity(entry.normalized, g.normalized);
        if (sim >= 0.55) {
          // Benzer bulundu — daha uzun ismi koru (genelde daha açıklayıcı)
          if (entry.original.length > g.canonical.length) {
            g.canonical = entry.original;
            g.normalized = entry.normalized;
          }
          g.count++;
          found = true;
          break;
        }
      }

      if (!found) {
        groups.push({
          canonical: entry.original,
          normalized: entry.normalized,
          count: 1
        });
      }
    });

    return groups;
  }

  document.getElementById("report-btn").addEventListener("click", () => {
    const startDate = document.getElementById("report-start").value;
    const endDate = document.getElementById("report-end").value;

    if (!startDate || !endDate) {
      alert("Lütfen başlangıç ve bitiş tarihlerini gir");
      return;
    }
    if (startDate > endDate) {
      alert("Başlangıç tarihi bitiş tarihinden sonra olamaz");
      return;
    }

    // Tarih aralığındaki tüm öğeleri filtrele
    const filtered = allItems.filter(i => i.date >= startDate && i.date <= endDate);

    if (filtered.length === 0) {
      alert("Bu tarih aralığında kayıtlı öğe yok.");
      return;
    }

    // Akıllı tekilleştirme
    const uniqueItems = smartDeduplicate(filtered);

    // Alfabetik sırala
    uniqueItems.sort((a, b) => a.canonical.toLocaleLowerCase("tr").localeCompare(b.canonical.toLocaleLowerCase("tr"), "tr"));

    // Rapor render — checkbox'lu, işaretleyince silinen liste
    const resultDiv = document.getElementById("report-result");
    const listDiv = document.getElementById("report-list");
    listDiv.innerHTML = "";
    resultDiv.style.display = "block";

    // Başlık
    const titleDiv = document.createElement("div");
    titleDiv.style.cssText = "font-weight: 700; font-size: 16px; margin-bottom: 10px; color: #5856d6;";
    titleDiv.id = "report-title";
    titleDiv.textContent = "🛒 Alışveriş Listesi (" + uniqueItems.length + " ürün)";
    listDiv.appendChild(titleDiv);

    // Her ürün için satır oluştur
    uniqueItems.forEach(item => {
      const row = document.createElement("div");
      row.style.cssText = "display: flex; align-items: center; gap: 10px; padding: 8px 4px; border-bottom: 1px solid #f2f2f7;";

      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.style.cssText = "width: 22px; height: 22px; flex-shrink: 0; accent-color: #34c759; cursor: pointer;";

      const label = document.createElement("span");
      label.style.cssText = "font-size: 16px; font-weight: 500; flex: 1;";
      label.textContent = item.canonical;

      cb.addEventListener("change", () => {
        if (cb.checked) {
          row.style.transition = "opacity 0.2s, max-height 0.3s";
          row.style.opacity = "0.3";
          row.style.textDecoration = "line-through";
          row.style.color = "#c7c7cc";
          setTimeout(() => {
            row.remove();
            // Sayacı güncelle
            const remaining = listDiv.querySelectorAll("div[data-report-item]").length;
            titleDiv.textContent = "🛒 Alışveriş Listesi (" + remaining + " ürün)";
          }, 300);
        }
      });

      row.setAttribute("data-report-item", item.canonical);
      row.appendChild(cb);
      row.appendChild(label);
      listDiv.appendChild(row);
    });

    // WhatsApp butonu — sadece kalan (silinmemiş) ürünleri gönderir
    document.getElementById("report-wa-btn").onclick = () => {
      const remaining = listDiv.querySelectorAll("div[data-report-item]");
      if (remaining.length === 0) {
        alert("Listede ürün kalmadı");
        return;
      }
      let waText = "🛒 *Alışveriş Listesi* (" + remaining.length + " ürün)\n\n";
      remaining.forEach(row => {
        waText += "• " + row.getAttribute("data-report-item") + "\n";
      });
      const encoded = encodeURIComponent(waText.trim());
      window.open("https://wa.me/?text=" + encoded, "_blank");
    };

    resultDiv.scrollIntoView({ behavior: "smooth", block: "start" });
  });
</script>
