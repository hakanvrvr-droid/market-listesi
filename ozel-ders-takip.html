<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ders Takip">
<meta name="theme-color" content="#0F172A">
<title>Ders Takip</title>
<style>
:root {
  --bg: #0F172A;
  --card: #1E293B;
  --card2: #162032;
  --accent: #6366F1;
  --accentL: #818CF8;
  --accentDim: rgba(99,102,241,0.15);
  --ok: #10B981;
  --okBg: rgba(16,185,129,0.12);
  --red: #F43F5E;
  --redBg: rgba(244,63,94,0.12);
  --warn: #F59E0B;
  --warnBg: rgba(245,158,11,0.12);
  --blue: #38BDF8;
  --blueBg: rgba(56,189,248,0.12);
  --txt: #F1F5F9;
  --sub: #94A3B8;
  --muted: #475569;
  --border: rgba(148,163,184,0.1);
  --safe-top: env(safe-area-inset-top);
  --safe-bot: env(safe-area-inset-bottom);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--txt); font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; min-height: 100dvh; overflow-x: hidden; }
#app { display: flex; flex-direction: column; height: 100dvh; }

/* HEADER */
.hdr { background: var(--bg); padding: calc(var(--safe-top) + 12px) 16px 12px; border-bottom: 0.5px solid var(--border); flex-shrink: 0; }
.hdr-row { display: flex; justify-content: space-between; align-items: center; }
.hdr-title { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
.hdr-date { font-size: 12px; color: var(--sub); margin-top: 2px; }
.add-btn { background: var(--accent); color: #fff; border: none; border-radius: 12px; padding: 9px 16px; font-size: 14px; font-weight: 700; cursor: pointer; }

/* STATS */
.stats { display: flex; gap: 8px; padding: 10px 16px 0; flex-shrink: 0; }
.stat { flex: 1; background: var(--card); border-radius: 12px; padding: 10px 6px; text-align: center; border: 0.5px solid var(--border); }
.stat-n { font-size: 22px; font-weight: 700; }
.stat-l { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; margin-top: 2px; }

/* FILTERS */
.filters { display: flex; gap: 8px; padding: 10px 16px; overflow-x: auto; flex-shrink: 0; scrollbar-width: none; }
.filters::-webkit-scrollbar { display: none; }
.chip { display: flex; align-items: center; gap: 4px; background: var(--card); border: 0.5px solid var(--border); border-radius: 20px; padding: 7px 12px; white-space: nowrap; cursor: pointer; font-size: 13px; color: var(--sub); }
.chip.active { background: var(--accentDim); border-color: rgba(99,102,241,0.4); color: var(--accentL); font-weight: 600; }
.chip-x { color: var(--accentL); font-size: 11px; margin-left: 2px; }
.clear-chip { background: var(--redBg); border-color: rgba(244,63,94,0.3); color: var(--red); }

/* LIST */
.list { flex: 1; overflow-y: auto; padding: 4px 0 calc(var(--safe-bot) + 20px); -webkit-overflow-scrolling: touch; }
.empty { text-align: center; padding: 60px 20px; color: var(--sub); }
.empty-icon { font-size: 40px; margin-bottom: 12px; }

/* CARD */
.kart { background: var(--card); border-radius: 16px; margin: 5px 14px; padding: 14px; border: 0.5px solid var(--border); }
.kart-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; gap: 8px; }
.kart-pills { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
.pill { padding: 5px 10px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; }
.pill-og { background: var(--accentDim); color: var(--accent); }
.pill-dr { background: rgba(129,140,248,0.1); color: var(--accentL); }
.kart-right { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
.bdg { padding: 5px 10px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; }
.del-btn { width: 28px; height: 28px; border-radius: 8px; background: var(--redBg); border: none; color: var(--red); font-size: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; }

.grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 7px; margin-bottom: 10px; }
.gi { background: var(--card2); border-radius: 10px; padding: 9px 8px; }
.gi-l { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 3px; }
.gi-v { font-size: 13px; font-weight: 500; }
.tappable { color: var(--accentL); text-decoration: underline; cursor: pointer; }

.kart-bot { display: flex; justify-content: space-between; align-items: center; padding-top: 8px; border-top: 0.5px solid var(--border); gap: 8px; }
.kart-bot-item .gi-l { font-size: 9px; color: var(--muted); text-transform: uppercase; margin-bottom: 2px; }
.kart-bot-item .gi-v { font-size: 13px; font-weight: 500; }

/* MODAL */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 100; align-items: flex-end; }
.overlay.open { display: flex; }
.sheet { background: var(--card); border-radius: 20px 20px 0 0; width: 100%; padding-bottom: calc(var(--safe-bot) + 8px); max-height: 70vh; overflow-y: auto; }
.sheet-handle { width: 36px; height: 4px; background: var(--muted); border-radius: 2px; margin: 10px auto 6px; }
.sheet-title { font-size: 12px; color: var(--sub); text-align: center; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.sheet-opt { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; cursor: pointer; font-size: 16px; border-bottom: 0.5px solid var(--border); }
.sheet-opt.sel { background: var(--accentDim); color: var(--accentL); font-weight: 600; }
.sheet-opt:last-child { border-bottom: none; }
.check { color: var(--accent); font-weight: 700; }

.date-sheet { background: var(--card); border-radius: 20px 20px 0 0; width: 100%; padding: 0 16px calc(var(--safe-bot) + 16px); }
.date-input { background: var(--card2); border: 1.5px solid rgba(99,102,241,0.5); border-radius: 12px; color: var(--txt); font-size: 20px; padding: 14px; text-align: center; letter-spacing: 2px; width: 100%; margin-bottom: 8px; -webkit-appearance: none; }
.date-input::placeholder { color: var(--muted); letter-spacing: 0; font-size: 14px; }
.date-preview { color: var(--accentL); text-align: center; font-size: 14px; min-height: 20px; margin-bottom: 12px; }
.date-err { color: var(--red); text-align: center; font-size: 13px; margin-bottom: 8px; }
.date-btns { display: flex; gap: 10px; }
.btn-cancel { flex: 1; background: var(--card2); border: none; border-radius: 12px; padding: 14px; color: var(--red); font-size: 16px; font-weight: 600; cursor: pointer; }
.btn-ok { flex: 1; background: var(--accent); border: none; border-radius: 12px; padding: 14px; color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; }
.cancel-btn-big { margin: 8px 16px 0; background: var(--card2); border: none; border-radius: 12px; padding: 14px; color: var(--red); font-size: 16px; font-weight: 600; cursor: pointer; width: calc(100% - 32px); }

/* INSTALL BANNER */
.install-banner { display: none; background: var(--accentDim); border: 0.5px solid rgba(99,102,241,0.4); margin: 8px 14px 0; border-radius: 12px; padding: 10px 14px; font-size: 13px; color: var(--accentL); line-height: 1.5; }
.install-banner b { color: var(--txt); }
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div id="install-banner" class="install-banner">
      📲 Ana ekrana eklemek için: Safari'de <b>Paylaş</b> → <b>Ana Ekrana Ekle</b>
      <button onclick="document.getElementById('install-banner').style.display='none'" style="float:right;background:none;border:none;color:var(--accentL);font-size:16px;cursor:pointer;margin-top:-2px">✕</button>
    </div>
    <div class="hdr-row">
      <div>
        <div class="hdr-title">Ders Takip</div>
        <div class="hdr-date" id="today-lbl"></div>
      </div>
      <button class="add-btn" onclick="addRow()">+ Ekle</button>
    </div>
  </div>
  <div class="stats" id="stats-row"></div>
  <div class="filters" id="filters-row"></div>
  <div class="list" id="list"></div>
</div>

<!-- Picker Modal -->
<div class="overlay" id="picker-modal" onclick="if(event.target===this)closePicker()">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="picker-title"></div>
    <div id="picker-opts"></div>
    <button class="cancel-btn-big" onclick="closePicker()">İptal</button>
  </div>
</div>

<!-- Date Modal -->
<div class="overlay" id="date-modal" onclick="if(event.target===this)closeDatePicker()">
  <div class="date-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="date-title"></div>
    <input class="date-input" id="date-input" type="date" oninput="onDateInput()">
    <div class="date-preview" id="date-preview"></div>
    <div class="date-err" id="date-err"></div>
    <div class="date-btns">
      <button class="btn-cancel" onclick="closeDatePicker()">İptal</button>
      <button class="btn-ok" onclick="confirmDate()">Tamam</button>
    </div>
  </div>
</div>

<!-- Money Modal -->
<div class="overlay" id="money-modal" onclick="if(event.target===this)closeMoney()">
  <div class="date-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="money-title"></div>
    <input class="date-input" id="money-input" type="text" inputmode="decimal" placeholder="0,00" oninput="onMoneyInput()">
    <div class="date-preview" id="money-preview"></div>
    <div class="date-err" id="money-err"></div>
    <div class="date-btns">
      <button class="btn-cancel" onclick="closeMoney()">İptal</button>
      <button class="btn-ok" onclick="confirmMoney()">Tamam</button>
    </div>
  </div>
</div>

  if (!d) return '';

function fmtDate(d) {
  if (!d) return '';
  const dt = new Date(d);
  if (isNaN(dt)) return '';
  return dt.toLocaleDateString('tr-TR');
}
function fmtMoney(n) {
  if (n === '' || n === null || n === undefined) return '';
  const num = parseFloat(n);
  if (isNaN(num)) return '';
  return num.toLocaleString('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function parseMoney(str) {
  if (str === '' || str === null || str === undefined) return '';
  const cleaned = String(str).replace(/\./g, '').replace(',', '.');

  {id:61,o:'Bekir',d:'Matematik',no:7,y:'Hayır',t:'2026-04-22',g:'Çarşamba',u:556,v:'',oe:'',od:'Ödenmedi'},
  {id:62,o:'Bekir',d:'Matematik',no:8,y:'Hayır',t:'2026-04-25',g:'Cumartesi',u:556,v:'2026-04-25',oe:5000,od:'Ödenmedi'},
  {id:63,o:'Türkçe Grup',d:'Türkçe',no:1,y:'Evet',t:'2026-04-07',g:'Salı',u:425,v:'2026-04-07',oe:1700,od:'Ödenmedi'},
  {id:64,o:'Türkçe Grup',d:'Türkçe',no:2,y:'Evet',t:'2026-04-14',g:'Salı',u:425,v:'',oe:'',od:'Ödenmedi'},
  {id:65,o:'Türkçe Grup',d:'Türkçe',no:3,y:'Hayır',t:'2026-04-21',g:'Salı',u:425,v:'',oe:'',od:'Ödenmedi'},
  {id:66,o:'Türkçe Grup',d:'Türkçe',no:4,y:'Hayır',t:'2026-04-28',g:'Salı',u:425,v:'',oe:'',od:'Ödenmedi'},
];

const SK = 'ders_takip_v2';
let rows = JSON.parse(localStorage.getItem(SK) || 'null') || INIT;
let nextId = Math.max(...rows.map(r=>r.id)) + 1;
let fY='', fO='', fD='';
let pickerCb=null, dateCb=null;

function save() { localStorage.setItem(SK, JSON.stringify(rows)); }

function filtered() {
  return rows.filter(r => {
    if (fY && r.y !== fY) return false;
    if (fO && r.o !== fO) return false;
    if (fD && r.d !== fD) return false;
    return true;
  });
}

function renderStats() {
  const f = filtered();
  const total=f.length, evet=f.filter(r=>r.y==='Evet').length, hayir=f.filter(r=>r.y==='Hayır').length, odenmedi=f.filter(r=>r.od==='Ödenmedi').length;
  document.getElementById('stats-row').innerHTML = `
    <div class="stat"><div class="stat-n">${total}</div><div class="stat-l">Toplam</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--ok)">${evet}</div><div class="stat-l">Yapıldı</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--red)">${hayir}</div><div class="stat-l">Yapılmadı</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--warn)">${odenmedi}</div><div class="stat-l">Ödenmedi</div></div>
  `;
}

function renderFilters() {
  const chips = [];
  chips.push(`<div class="chip${fY?' active':''}" onclick="openPicker(['','Eski','Evet','Hayır'],'Ders Yapıldı mı?',v=>{fY=v;render()},fY)">${fY||'Durum'}${fY?`<span class="chip-x" onclick="event.stopPropagation();fY='';render()">✕</span>`:''}</div>`);
  chips.push(`<div class="chip${fO?' active':''}" onclick="openPicker(['','Bekir','Melda','Türkçe Grup'],'Öğretmen',v=>{fO=v;render()},fO)">${fO||'Öğretmen'}${fO?`<span class="chip-x" onclick="event.stopPropagation();fO='';render()">✕</span>`:''}</div>`);
  chips.push(`<div class="chip${fD?' active':''}" onclick="openPicker(['','Matematik','İngilizce','Türkçe'],'Ders',v=>{fD=v;render()},fD)">${fD||'Ders'}${fD?`<span class="chip-x" onclick="event.stopPropagation();fD='';render()">✕</span>`:''}</div>`);
  if (fY||fO||fD) chips.push(`<div class="chip clear-chip" onclick="fY='';fO='';fD='';render()">Temizle</div>`);
  document.getElementById('filters-row').innerHTML = chips.join('');
}

function renderList() {
  const f = filtered();
  if (!f.length) {
    document.getElementById('list').innerHTML = `<div class="empty"><div class="empty-icon">📭</div><div>Kayıt bulunamadı</div></div>`;
    return;
  }
  document.getElementById('list').innerHTML = f.map(r => {
    const yc = YCOLOR[r.y]||{bg:'var(--border)',c:'var(--sub)'};
    const oc = OCOLOR[r.od]||{bg:'var(--border)',c:'var(--sub)'};
    return `<div class="kart">
      <div class="kart-top">
        <div class="kart-pills">
          <span class="pill pill-og" onclick="openPicker(OGRETMENLER,'Öğretmen',v=>upd(${r.id},'o',v),\`${r.o}\`)">${r.o}</span>
          <span class="pill pill-dr" onclick="openPicker(DERSLER,'Ders',v=>upd(${r.id},'d',v),\`${r.d}\`)">${r.d}</span>
        </div>
        <div class="kart-right">
          <span class="bdg" style="background:${yc.bg};color:${yc.c}" onclick="openPicker(YAPILDI,'Ders Yapıldı mı?',v=>upd(${r.id},'y',v),\`${r.y}\`)">${r.y}</span>
          <button class="del-btn" onclick="delRow(${r.id})">✕</button>
        </div>
      </div>
      <div class="grid">
        <div class="gi"><div class="gi-l">Ders No</div><div class="gi-v">#${r.no}</div></div>
        <div class="gi"><div class="gi-l">Tarih</div><div class="gi-v tappable" onclick="openDate('Tarih',r=>{upd(${r.id},'t',r)},\`${r.t}\`)">${fmtDate(r.t)||'—'}</div></div>
        <div class="gi"><div class="gi-l">Gün</div><div class="gi-v">${r.g||'—'}</div></div>
        <div class="gi"><div class="gi-l">Ücret</div><div class="gi-v tappable" onclick="openMoney('Ders Ücreti',v=>upd(${r.id},'u',v),${JSON.stringify(r.u)})">${r.u!==''&&r.u!==null&&r.u!==undefined?'₺'+fmtMoney(r.u):'—'}</div></div>
      </div>
      <div class="kart-bot">
        <div class="kart-bot-item"><div class="gi-l">Vade</div><div class="gi-v tappable" style="font-size:13px" onclick="openDate('Vade',v=>upd(${r.id},'v',v),\`${r.v}\`)">${fmtDate(r.v)||'—'}</div></div>
        <div class="kart-bot-item"><div class="gi-l">Ödenecek</div><div class="gi-v tappable" style="font-size:13px" onclick="openMoney('Ödenecek Tutar',v=>upd(${r.id},'oe',v),${JSON.stringify(r.oe)})">${r.oe!==''&&r.oe!==null&&r.oe!==undefined?'₺'+fmtMoney(r.oe):'—'}</div></div>
        <span class="bdg" style="background:${oc.bg};color:${oc.c};font-size:12px" onclick="openPicker(['Ödendi','Ödenmedi',''],'Ödeme',v=>upd(${r.id},'od',v),\`${r.od}\`)">${r.od||'—'}</span>
      </div>
    </div>`;
  }).join('');
}

function render() { renderStats(); renderFilters(); renderList(); }

function upd(id, field, val) {
  rows = rows.map(r => {
    if (r.id !== id) return r;
    const n = {...r, [field]: val};
    if (field==='t') n.g = getGun(val);
    return n;
  });
  save(); render();
}

function delRow(id) {
  if (!confirm('Bu dersi silmek istediğinizden emin misiniz?')) return;
  rows = rows.filter(r => r.id !== id);
  save(); render();
}

function addRow() {
  rows.push({id:nextId++,o:'Bekir',d:'Matematik',no:1,y:'Hayır',t:'',g:'',u:0,v:'',oe:'',od:'Ödenmedi'});
  fY=''; fO=''; fD='';
  save(); render();
  setTimeout(()=>{ const l=document.getElementById('list'); l.scrollTop=l.scrollHeight; },100);
}

// Picker
function openPicker(opts, title, cb, cur) {
  pickerCb = cb;
  document.getElementById('picker-title').textContent = title;
  document.getElementById('picker-opts').innerHTML = opts.map(o =>
    `<div class="sheet-opt${o===cur?' sel':''}" onclick="selectPicker(\`${o}\`)">${o||'—'}${o===cur?'<span class="check">✓</span>':''}</div>`
  ).join('');
  document.getElementById('picker-modal').classList.add('open');
}
function selectPicker(v) { if(pickerCb) pickerCb(v); closePicker(); }
function closePicker() { document.getElementById('picker-modal').classList.remove('open'); }

// Date picker
function openDate(title, cb, cur) {
  dateCb = cb;
  document.getElementById('date-title').textContent = title;
  document.getElementById('date-input').value = cur || '';
  document.getElementById('date-preview').textContent = cur ? '📅 ' + getGun(cur) : '';
  document.getElementById('date-err').textContent = '';
  document.getElementById('date-modal').classList.add('open');
  setTimeout(()=>document.getElementById('date-input').focus(),300);
}
function onDateInput() {
  const v = document.getElementById('date-input').value;
  document.getElementById('date-preview').textContent = v ? '📅 ' + (getGun(v)||'') : '';
  document.getElementById('date-err').textContent = '';
}
function confirmDate() {
  const v = document.getElementById('date-input').value;
  if (v && isNaN(new Date(v))) { document.getElementById('date-err').textContent = 'Geçersiz tarih'; return; }
  if (dateCb) dateCb(v);
  closeDatePicker();
}
function closeDatePicker() { document.getElementById('date-modal').classList.remove('open'); }

// Money picker
let moneyCb=null;
function openMoney(title, cb, cur) {
  moneyCb = cb;
  document.getElementById('money-title').textContent = title;
  document.getElementById('money-input').value = (cur!==''&&cur!==null&&cur!==undefined) ? fmtMoney(cur) : '';
  document.getElementById('money-preview').textContent = '';
  document.getElementById('money-err').textContent = '';
  document.getElementById('money-modal').classList.add('open');
  setTimeout(()=>{ const el=document.getElementById('money-input'); el.focus(); el.select(); },300);
}
function onMoneyInput() {
  const v = document.getElementById('money-input').value;
  const num = parseMoney(v);
  document.getElementById('money-preview').textContent = (num!=='' ) ? '₺' + fmtMoney(num) : '';
  document.getElementById('money-err').textContent = '';
}
function confirmMoney() {
  const v = document.getElementById('money-input').value.trim();
  if (v === '') { if(moneyCb) moneyCb(''); closeMoney(); return; }
  const num = parseMoney(v);
  if (num === '' || isNaN(num)) { document.getElementById('money-err').textContent = 'Geçersiz tutar'; return; }
  if (moneyCb) moneyCb(num);
  closeMoney();
}
function closeMoney() { document.getElementById('money-modal').classList.remove('open'); }

// Init
document.getElementById('today-lbl').textContent = new Date().toLocaleDateString('tr-TR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

// Show install banner if not standalone
if (!window.navigator.standalone) {
  document.getElementById('install-banner').style.display = 'block';
}

render();
</script>
</body>
</html>
